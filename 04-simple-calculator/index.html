<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>GLITCH-CALC // I'M NOT A BOT</title>
    
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet" />
    
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <div class="background-decorations">
        <div class="bg-text bg-text-1">I'M NOT A BOT</div>
        <div class="bg-text bg-text-2">SYSTEM_ERROR</div>
        <img 
            alt="Pixel art background element" 
            class="bg-image" 
            src="https://lh3.googleusercontent.com/aida-public/AB6AXuD4PZWCnqdtU2Re-afkIOKRaWeOEZ335wqFVvjgZ7uohbSspFKTFhQD2-7u6Ps727h8Gal-6AFJLuLaedtTg94FtQ30YXYdYAi-j68mjDgBZhlAorprxuD6olYs_5FhWWxaMl_sugNlF97Lkigx1pPnzanclGOtxFYYC-GIPwzg4fJeYOFKQq2x7_X_VFMPjkIEVZCH7h-hrVHujuHJwwdNYAp-bDicnBUmerKal-zBYa3fZndP5dqxV8YlWZSuiUq8IAIhJ_doIA"
        />
    </div>

    <div class="calculator-wrapper">
        
        <div class="calculator">
            
            <div class="header">
                <span class="header-text">Batch.001 // CALC</span>
                <div class="header-dots">
                    <div class="dot dot-purple"></div>
                    <div class="dot dot-green"></div>
                    <div class="dot dot-blue"></div>
                </div>
            </div>

            <div class="display">
                <div class="moving-line"></div>
                <div class="display-result" id="display">0</div>
            </div>

            <div class="buttons-grid">
                
                <button class="btn btn-purple" id="btnClear">
                    <span class="btn-text">CLR</span>
                    <div class="btn-hover-icon">
                        <img 
                            alt="Purple Monkey icon" 
                            src="https://lh3.googleusercontent.com/aida-public/AB6AXuDNwDt52f2LuyqXyPvgFfumZViE1t18IywF4xmBRTvNIMPAK66tMned9fPtYM8tn9pIA6-8NH5Jm5vgXikwrIRCslLplQBA352ABUY66WNy1ztdVwUdNLYcLqLrY8eattlZ4nlAqTA_1M1OomOrwisUUOJ99j-4d09JQlny9VAcS2K29yFAE_nEhzckI7JoQp8IK2rALyu5l1tYQ5VMQEHwzJyMdrc0NobOYEjSKjNAy59FpQUrjCLOtftnbTgyDril9GbRbhmV_Q"
                        />
                    </div>
                </button>
                <button class="btn btn-dark btn-operator" data-operator="/">/</button>
                <button class="btn btn-dark btn-operator" data-operator="*">*</button>
                <button class="btn btn-blue" id="btnDelete">
                    <span class="btn-text">DEL</span>
                </button>

                <button class="btn btn-dark btn-number" data-number="7">7</button>
                <button class="btn btn-dark btn-number" data-number="8">8</button>
                <button class="btn btn-dark btn-number" data-number="9">9</button>
                <button class="btn btn-dark btn-operator" data-operator="-">-</button>

                <button class="btn btn-dark btn-number" data-number="4">4</button>
                <button class="btn btn-dark btn-number" data-number="5">5</button>
                <button class="btn btn-dark btn-number" data-number="6">6</button>
                <button class="btn btn-dark btn-operator" data-operator="+">+</button>

                <div class="bottom-section">
                    <div class="bottom-left">
                        <button class="btn btn-dark btn-number" data-number="1">1</button>
                        <button class="btn btn-dark btn-number" data-number="2">2</button>
                        <button class="btn btn-dark btn-number" data-number="3">3</button>
                        <button class="btn btn-dark btn-number btn-zero" data-number="0">0</button>
                        <button class="btn btn-dark btn-number" data-number=".">.</button>
                    </div>
                    <button class="btn btn-green btn-equals" id="btnEquals">
                        <img 
                            alt="Green Robot icon" 
                            class="equals-icon"
                            src="https://lh3.googleusercontent.com/aida-public/AB6AXuCDq0zcV-qsnVJqONc5epcIbPZrTl2lxsV3HQKjVFZam0oRrGnFQYlGskruODQTbDAsgK6qIPuHYFje3N6IfvdNqaq6tvEhOsInNWM4e6XHIoipLsB44vanlN1M0ZrMDzXSejf0dcEurJ9DVixuv1QcGesYfIQqwAp8SmtMf_rtboVV2A_PjIq8FZLEV32IaCUUtct_JmleT60xpJ1QqtE3UNVfv15nIKkA_XKajFlSBCgRnHDFABX8-TXAn8twNbCT4H4SiwKABQ"
                        />
                        <span class="equals-text">=</span>
                    </button>
                </div>

            </div>

            <div class="footer">
                <div class="footer-left">
                    CPU_LOAD: <span id="cpuLoad">82</span>%<br />
                    READY_STATE: <span id="readyState">TRUE</span>
                </div>
                <div class="footer-right">
                    ID: 0x882_BOT_VERIFIED
                </div>
            </div>

        </div>

        <div class="corner-decoration corner-top-right"></div>
        <div class="corner-decoration corner-bottom-left"></div>

    </div>

    <div class="floating-character">
        <div class="character-container">
            <img 
                alt="Character decoration" 
                src="https://lh3.googleusercontent.com/aida-public/AB6AXuAq83Z2sxv_3vngMxdeC1IRr2s0dLs8qqTc6uA0bGDsX4iAmgx8tBHdqcOjTC13MuNqBPddexvdUx06dUbVO3HEq2iqMK57OiuDEowp7Mybv_IgseA10LpP38RL-nnrDL2o2UFW3bVaQs5E2pvlemR0Q0W01U6dAQmqKZ4yXUZiGTqQ6bxjcv4zMgMsq-0Sch8kCtCZXmx-5vpjIrR_HNw8zd1Zas9_heHdFSdP7YUyTRciHLxLoIBEqNjVDpH1LZqitM7B0yp7nA"
            />
            <div class="character-label">HUMAN?</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
