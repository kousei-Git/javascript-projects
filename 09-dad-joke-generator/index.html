<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Vienna's Famous Dad Joke Bar</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Permanent+Marker&family=Roboto:wght@700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <!-- Header -->
    <header class="header">
        <div class="header-decor">
            <img
                alt="Moose Logo Fragment"
                class="header-decor-img"
                src="https://lh3.googleusercontent.com/aida-public/AB6AXuCe1BSopkr5inTwYJ48YKEX-KW1FshSutO6g5qC3SE2F8OYZ7Vng_-awMKQbkpk_ryP_L2sQ2zLHG7F8DY-Su9jC2_vaI_Z5sExZXpHK2cHDwTxkmUvT-Rm_TbFAlpX6lyLyP_puEcWZp0RgC4SvuaFa3qhCnsJoo7yjJDP7k2hZiVxvhYpFAytkpMdjAwXEJ7HvEPScycPArJrYVx7B23o5GQFqxVQiASB4t5sFbIv5OKZKoqyydldy6Cty4vVvxX0kr560wfSSLlF"
            />
        </div>
        <div class="header-content">
            <h1 class="header-title comic-font">The Groan &amp; Gulp</h1>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-grid">

        <!-- Center Column: Joke Display -->
        <section class="joke-column">
            <div class="joke-card">
                <div class="joke-card-badge">TAP FOR WISDOM</div>
                <div class="joke-card-body" id="jokeContainer">
                    <p class="joke-text comic-font" id="jokeText">
                        "I'm afraid for the calendar. Its days are numbered."
                    </p>
                </div>
                <div class="joke-card-footer">
                    <div class="joke-card-actions">
                        <button class="btn-share">COPY</button>
                    </div>
                    <span class="joke-card-hashtag">#BADPUNS</span>
                </div>
            </div>
        </section>

        <button class="btn-get-joke comic-font" id="jokeBtn">Get Random Joke</button>

        <!-- Bottom/Full Width: Recent Groans -->
        <section class="history-column" style="display: none;">
            <div class="history-card">
                <h2 class="history-title comic-font">RECENT GROANS (HISTORY)</h2>
                <ul class="history-list" id="jokeHistory">
                    <!-- //Item -->
                </ul>
            </div>
        </section>

    </main>

    <!-- Footer -->
    <footer class="main-footer">
        <p class="main-footer-text">
            No Mooses were harmed in the making of these jokes. Probably.
        </p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
