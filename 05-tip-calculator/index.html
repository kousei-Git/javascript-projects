<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>90s Nostalgia Tip Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Permanent+Marker&family=Bungee&family=Inter:wght@400;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
    <div class="main-container">
        <!-- Background decorative shapes -->
        <div class="bg-shape bg-shape-yellow"></div>
        <div class="bg-shape bg-shape-purple"></div>
        <div class="bg-shape bg-shape-blue"></div>

        <div class="content-grid">
            <!-- Left Column -->
            <div class="left-column">
                <!-- Cassette Tape Input -->
                <div class="cassette-wrapper">
                    <div class="cassette-body">
                        <div class="cassette-header">
                            <span class="cassette-label">90 MIN</span>
                            <div class="cassette-dots">
                                <div class="cassette-dot"></div>
                                <div class="cassette-dot"></div>
                            </div>
                        </div>
                        <div class="cassette-window">
                            <div class="cassette-reel cassette-reel-left">
                                <div class="cassette-reel-center"></div>
                            </div>
                            <div class="cassette-reel cassette-reel-right">
                                <div class="cassette-reel-center"></div>
                            </div>
                            <div class="cassette-input-area">
                                <label class="cassette-input-label" for="bill">Bill Amount $$</label>
                                <input class="cassette-input" id="bill" placeholder="0.00" type="number"/>
                            </div>
                        </div>
                        <div class="cassette-footer">
                            <div class="cassette-line"></div>
                            <span class="cassette-text">STEREO CASSETTE RECORDER</span>
                            <div class="cassette-line"></div>
                        </div>
                    </div>
                    <div class="cassette-sticker">HANDS OFF!</div>
                </div>

                <!-- Vinyl Record with Tip Buttons -->
                <div class="vinyl-container">
                    <div class="vinyl-record">
                        <div class="vinyl-inner-ring"></div>
                        <div class="vinyl-center">
                            <div class="vinyl-center-hole"></div>
                        </div>
                        <div class="vinyl-labels">
                            <span class="vinyl-label vinyl-label-rad">RAD! (25%)</span>
                            <span class="vinyl-label vinyl-label-dope">DOPE (20%)</span>
                            <span class="vinyl-label vinyl-label-okay">OKAY (15%)</span>
                        </div>
                    </div>
                    <div class="tip-buttons-overlay">
                        <div class="tip-buttons-grid">
                            <button class="tip-btn active" data-tip="15">Default - 15%</button>
                            <button class="tip-btn" data-tip="20">20%</button>
                            <button class="tip-btn" data-tip="25">25%</button>
                            <div class="custom-tip-wrapper">
                                <input class="custom-tip-input" id="customTip" placeholder="%" type="number"/>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Party Size Input -->
                <div class="party-size-card">
                    <span class="material-icons party-icon">groups</span>
                    <div class="party-input-wrapper">
                        <label class="party-label" for="people">Party Size</label>
                        <input class="party-input" id="people" min="1" type="number" value="1"/>
                    </div>
                </div>
            </div>

            <!-- Right Column -->
            <div class="right-column">
                <!-- Portable Music Player -->
                <div class="player-body">
                    <div class="player-header">
                        <div class="player-header-line"></div>
                        <div class="player-title">MY MUSIC</div>
                        <div class="player-header-dots">
                            <div class="player-dot"></div>
                            <div class="player-dot"></div>
                        </div>
                    </div>
                    <div class="lcd-screen">
                        <div class="lcd-overlay"></div>
                        <div class="lcd-content">
                            <div class="lcd-header">
                                <span>Output_Mode</span>
                                <span class="lcd-play-indicator">● PLAY</span>
                            </div>
                            <div class="lcd-results">
                                <div class="lcd-result-item">
                                    <div class="lcd-result-label">Tip Amount</div>
                                    <div class="lcd-result-value lcd-result-large" id="tipResult">$0.00</div>
                                </div>
                                <div class="lcd-result-item">
                                    <div class="lcd-result-label">Total / Person</div>
                                    <div class="lcd-result-value lcd-result-medium" id="totalResult">$0.00</div>
                                </div>
                            </div>
                        </div>
                        <div class="lcd-footer">
                            <div class="lcd-bars">
                                <div class="lcd-bar lcd-bar-1"></div>
                                <div class="lcd-bar lcd-bar-2"></div>
                                <div class="lcd-bar lcd-bar-3"></div>
                                <div class="lcd-bar lcd-bar-4"></div>
                            </div>
                            <div class="lcd-edition">1998 EDITION</div>
                        </div>
                    </div>
                    <div class="player-controls">
                        <div class="player-buttons">
                            <div class="player-button">
                                <span class="material-icons">skip_previous</span>
                            </div>
                            <div class="player-button">
                                <span class="material-icons">skip_next</span>
                            </div>
                        </div>
                        <div class="player-wheels">
                            <div class="player-wheel"></div>
                            <div class="player-wheel"></div>
                        </div>
                    </div>
                </div>

                <!-- Calculate Button (Cat) -->
                <div class="calc-button-wrapper">
                    <button class="calc-button" id="calculateBtn">
                        <svg class="calc-cat-svg" viewBox="0 0 200 200">
                            <path d="M40 80 Q 40 40 80 40 Q 100 40 120 40 Q 160 40 160 80 Q 160 140 100 140 Q 40 140 40 80" fill="white"></path>
                            <path d="M40 80 L 30 40 L 70 55" fill="white"></path>
                            <path d="M160 80 L 170 40 L 130 55" fill="white"></path>
                            <circle cx="75" cy="85" fill="black" r="5"></circle>
                            <circle cx="125" cy="85" fill="black" r="5"></circle>
                            <circle cx="100" cy="100" fill="#fbbf24" r="4"></circle>
                            <path d="M140 60 Q 160 50 165 75" fill="#f87171" stroke="#ef4444" stroke-width="2"></path>
                            <path d="M140 60 Q 120 70 140 85" fill="#f87171" stroke="#ef4444" stroke-width="2"></path>
                        </svg>
                        <span class="calc-button-text">CALC!</span>
                    </button>
                    <div class="calc-button-decoration"></div>
                </div>

                <!-- Copyright Badge -->
                <div class="copyright-badge">
                    <span class="material-icons copyright-icon">copyright</span>
                    <span class="copyright-text">NOSTALGIA CORE 1995</span>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
